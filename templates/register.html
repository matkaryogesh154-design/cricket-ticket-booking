<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – CricketPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,83,0.12) 0%, transparent 70%); }
    .auth-box { background: var(--card); border: 1px solid rgba(0,200,83,0.2); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--green); margin-bottom: 6px; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; margin: 16px 0 4px; }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .error-msg { background: rgba(255,61,87,0.1); border: 1px solid rgba(255,61,87,0.3); color: var(--red); padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .success-msg { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); color: var(--green); padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .auth-btn { width: 100%; background: var(--green); color: #000; font-weight: 700; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 4px; }
    .auth-btn:hover { background: var(--dark-green); color: #fff; }
    .auth-link { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.88rem; }
    .auth-link a { color: var(--green); text-decoration: none; font-weight: 600; }
    .password-hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Cricket<span>Pass</span></div>
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Join lakhs of cricket fans 🏏</div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Rahul Sharma"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="regEmail" placeholder="rahul@email.com"/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="regPhone" placeholder="+91 98765 43210"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters"/>
      <div class="password-hint">At least 6 characters</div>
    </div>

    <button class="auth-btn" onclick="doRegister()" id="regBtn">Create Account →</button>

    <div class="auth-link">
      Already have an account? <a href="/login">Login</a>
    </div>
    <div class="auth-link" style="margin-top:10px;">
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>

<script>
async function doRegister() {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const phone    = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const btn      = document.getElementById('regBtn');

  if (!name || !email || !password) {
    showError('Please fill all required fields!'); return;
  }
  if (password.length < 6) {
    showError('Password at least 6 characters hava!'); return;
  }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  const res    = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, phone, password })
  });
  const result = await res.json();

  if (result.success) {
    document.getElementById('errorMsg').style.display = 'none';
    const el = document.getElementById('successMsg');
    el.textContent = '✅ Account created! Redirecting to login...';
    el.style.display = 'block';
    setTimeout(() => window.location.href = '/login', 1500);
  } else {
    showError(result.message || 'Registration failed!');
    btn.textContent = 'Create Account →';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
