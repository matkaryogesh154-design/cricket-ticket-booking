<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – CricketPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --green:#00C853; --navy:#0a0f1e; --card:#161f33; --accent:#FFD600; --text:#e8eaf6; --muted:#7e8fa6; --red:#FF3D57; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--navy); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,83,0.1) 0%, transparent 70%); }
    .box { background:var(--card); border:1px solid rgba(0,200,83,0.2); border-radius:20px; padding:40px; width:100%; max-width:420px; }
    .logo { font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--green); margin-bottom:6px; }
    .logo span { color:var(--accent); }
    h2 { font-family:'Bebas Neue',cursive; font-size:1.8rem; margin-bottom:4px; }
    p.sub { color:var(--muted); font-size:0.88rem; margin-bottom:22px; }
    label { display:block; font-size:0.74rem; color:var(--muted); margin-bottom:5px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
    input { width:100%; padding:11px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; margin-bottom:13px; }
    input:focus { border-color:var(--green); }
    input::placeholder { color:var(--muted); }
    .btn { width:100%; background:var(--green); color:#000; font-weight:700; border:none; padding:13px; border-radius:10px; cursor:pointer; font-size:1rem; font-family:'DM Sans',sans-serif; transition:background 0.2s; }
    .btn:hover { background:#00a844; color:#fff; }
    .btn:disabled { background:#1a3a2a; color:var(--muted); cursor:not-allowed; }
    .msg { padding:10px 14px; border-radius:10px; font-size:0.85rem; margin-bottom:14px; display:none; }
    .msg.error   { background:rgba(255,61,87,0.1);  border:1px solid rgba(255,61,87,0.3);  color:var(--red); }
    .msg.success { background:rgba(0,200,83,0.1);   border:1px solid rgba(0,200,83,0.3);   color:var(--green); }
    .bottom { text-align:center; margin-top:18px; color:var(--muted); font-size:0.85rem; }
    .bottom a { color:var(--green); text-decoration:none; font-weight:600; }
    .hint { font-size:0.75rem; color:var(--muted); margin-top:-8px; margin-bottom:12px; }

    /* OTP STEP */
    .otp-step { display:none; }
    .otp-info { background:rgba(0,200,83,0.06); border:1px solid rgba(0,200,83,0.2); border-radius:10px; padding:14px; margin-bottom:18px; font-size:0.85rem; color:var(--muted); }
    .otp-info strong { color:var(--green); display:block; margin-bottom:4px; }
    .otp-input { text-align:center; font-size:1.8rem; font-family:'Bebas Neue',cursive; letter-spacing:12px; color:var(--green); }
    .resend-row { display:flex; justify-content:space-between; align-items:center; margin-top:-6px; margin-bottom:14px; }
    .resend-btn { background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:0.82rem; font-family:'DM Sans',sans-serif; text-decoration:underline; }
    .resend-btn:disabled { color:var(--muted); cursor:not-allowed; text-decoration:none; }
    .timer { font-size:0.78rem; color:var(--muted); }

    /* STEPS INDICATOR */
    .steps { display:flex; gap:8px; margin-bottom:24px; }
    .step-dot { flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,0.1); }
    .step-dot.active { background:var(--green); }
    .step-dot.done   { background:rgba(0,200,83,0.4); }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">Cricket<span>Pass</span></div>

  <!-- Step Indicator -->
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
  </div>

  <!-- STEP 1: Register Form -->
  <div id="step1">
    <h2>Create Account</h2>
    <p class="sub">Join CricketPass and book tickets instantly</p>
    <div class="msg error" id="errMsg1"></div>

    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your full name"/>

    <label>Email Address</label>
    <input type="email" id="regEmail" placeholder="your@email.com"/>

    <label>Phone Number</label>
    <input type="tel" id="regPhone" placeholder="10-digit mobile number"/>

    <label>Password</label>
    <input type="password" id="regPass" placeholder="Minimum 6 characters"/>
    <p class="hint">At least 6 characters</p>

    <button class="btn" id="regBtn" onclick="sendOTP()">Send OTP →</button>
    <div class="bottom">Already have an account? <a href="/login">Login</a></div>
  </div>

  <!-- STEP 2: OTP Verification -->
  <div id="step2" class="otp-step">
    <h2>Verify Email</h2>
    <p class="sub">Enter the OTP sent to your email</p>

    <div class="otp-info">
      <strong>OTP sent to:</strong>
      <span id="otpEmailDisplay">—</span>
    </div>

    <div class="msg error"   id="errMsg2"></div>
    <div class="msg success" id="sucMsg2"></div>

    <label>Enter 6-digit OTP</label>
    <input type="text" id="otpInput" class="otp-input" maxlength="6" placeholder="000000" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>

    <div class="resend-row">
      <button class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>
      <span class="timer" id="timerDisplay">Resend in 30s</span>
    </div>

    <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify & Create Account ✓</button>
    <div class="bottom" style="margin-top:14px;">
      <a href="#" onclick="goBack()">← Change Email</a>
    </div>
  </div>
</div>

<script>
var userEmail = '';
var timerInterval = null;

// ===== SEND OTP =====
function sendOTP() {
  var name  = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var phone = document.getElementById('regPhone').value.trim();
  var pass  = document.getElementById('regPass').value;

  if (!name)              { showErr1('Please enter your name!'); return; }
  if (!email || !email.includes('@')) { showErr1('Please enter a valid email!'); return; }
  if (!phone || phone.length < 10)    { showErr1('Please enter a valid 10-digit phone!'); return; }
  if (pass.length < 6)   { showErr1('Password must be at least 6 characters!'); return; }

  var btn = document.getElementById('regBtn');
  btn.textContent = 'Sending OTP...';
  btn.disabled = true;

  fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, email: email, phone: phone, password: pass })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.otp_sent) {
      userEmail = email;
      showStep2();
      // Demo OTP display
      if (result.otp_demo) {
        document.getElementById('sucMsg2').textContent = 'Demo OTP (email not configured): ' + result.otp_demo;
        document.getElementById('sucMsg2').style.display = 'block';
      }
    } else {
      showErr1(result.message || 'Registration failed!');
      btn.textContent = 'Send OTP →';
      btn.disabled = false;
    }
  })
  .catch(function() {
    showErr1('Server error! Please try again.');
    btn.textContent = 'Send OTP →';
    btn.disabled = false;
  });
}

// ===== VERIFY OTP =====
function verifyOTP() {
  var otp = document.getElementById('otpInput').value.trim();
  if (otp.length !== 6) { showErr2('Please enter the 6-digit OTP!'); return; }

  var btn = document.getElementById('verifyBtn');
  btn.textContent = 'Verifying...';
  btn.disabled = true;

  fetch('/api/verify-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userEmail, otp: otp })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.success) {
      document.getElementById('errMsg2').style.display = 'none';
      document.getElementById('sucMsg2').textContent = '✅ Account verified! Redirecting to login...';
      document.getElementById('sucMsg2').style.display = 'block';
      clearInterval(timerInterval);
      setTimeout(function() { window.location.href = '/login'; }, 1500);
    } else {
      showErr2(result.message || 'Invalid OTP!');
      btn.textContent = 'Verify & Create Account ✓';
      btn.disabled = false;
    }
  })
  .catch(function() {
    showErr2('Server error! Please try again.');
    btn.textContent = 'Verify & Create Account ✓';
    btn.disabled = false;
  });
}

// ===== RESEND OTP =====
function resendOTP() {
  var btn = document.getElementById('resendBtn');
  btn.disabled = true;

  fetch('/api/resend-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userEmail })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.success) {
      document.getElementById('sucMsg2').textContent = result.otp_demo
        ? 'Demo OTP: ' + result.otp_demo
        : 'New OTP sent to your email!';
      document.getElementById('sucMsg2').style.display = 'block';
      startTimer(30);
    }
  });
}

// ===== SHOW STEP 2 =====
function showStep2() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('otpEmailDisplay').textContent = userEmail;
  document.getElementById('dot1').className = 'step-dot done';
  document.getElementById('dot2').className = 'step-dot active';
  startTimer(30);
}

function goBack() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.getElementById('regBtn').textContent = 'Send OTP →';
  document.getElementById('regBtn').disabled = false;
  document.getElementById('dot1').className = 'step-dot active';
  document.getElementById('dot2').className = 'step-dot';
  clearInterval(timerInterval);
}

// ===== TIMER =====
function startTimer(seconds) {
  clearInterval(timerInterval);
  var remaining = seconds;
  document.getElementById('resendBtn').disabled = true;
  document.getElementById('timerDisplay').textContent = 'Resend in ' + remaining + 's';

  timerInterval = setInterval(function() {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById('resendBtn').disabled = false;
      document.getElementById('timerDisplay').textContent = '';
    } else {
      document.getElementById('timerDisplay').textContent = 'Resend in ' + remaining + 's';
    }
  }, 1000);
}

// ===== HELPERS =====
function showErr1(msg) {
  var el = document.getElementById('errMsg1');
  el.textContent = msg;
  el.style.display = 'block';
}
function showErr2(msg) {
  var el = document.getElementById('errMsg2');
  el.textContent = msg;
  el.style.display = 'block';
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('step1').style.display !== 'none') sendOTP();
    else verifyOTP();
  }
});
</script>
</body>
</html>
