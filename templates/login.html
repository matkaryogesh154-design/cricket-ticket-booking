<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – CricketPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,83,0.12) 0%, transparent 70%); }
    .auth-box { background: var(--card); border: 1px solid rgba(0,200,83,0.2); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--green); margin-bottom: 6px; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; margin: 16px 0 4px; }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .error-msg { background: rgba(255,61,87,0.1); border: 1px solid rgba(255,61,87,0.3); color: var(--red); padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .auth-btn { width: 100%; background: var(--green); color: #000; font-weight: 700; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 4px; }
    .auth-btn:hover { background: var(--dark-green); color: #fff; }
    .auth-link { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.88rem; }
    .auth-link a { color: var(--green); text-decoration: none; font-weight: 600; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Cricket<span>Pass</span></div>
    <div class="auth-title">Welcome Back!</div>
    <div class="auth-sub">Login to book your cricket tickets 🏏</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="rahul@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••"/>
    </div>

    <button class="auth-btn" onclick="doLogin()" id="loginBtn">Login →</button>

    <div class="auth-link">
      Don't have an account? <a href="/register">Register</a>
    </div>
    <div class="auth-link" style="margin-top:10px;">
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Please fill all fields!'); return;
  }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  const res    = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const result = await res.json();

  if (result.success) {
    window.location.href = '/';
  } else {
    showError(result.message || 'Login failed!');
    btn.textContent = 'Login →';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
