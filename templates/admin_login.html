<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – CricketPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --green:#00C853; --dark-green:#00952d; --navy:#0a0f1e; --card:#161f33; --accent:#FFD600; --text:#e8eaf6; --muted:#7e8fa6; --red:#FF3D57; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--navy); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,83,0.1) 0%, transparent 70%); }
    .box { background:var(--card); border:1px solid rgba(0,200,83,0.2); border-radius:20px; padding:40px; width:100%; max-width:400px; }
    .logo { font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--green); }
    .logo span { color:var(--accent); }
    .admin-tag { display:inline-block; background:rgba(255,214,0,0.1); border:1px solid rgba(255,214,0,0.3); color:var(--accent); padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin:10px 0 20px; }
    h2 { font-family:'Bebas Neue',cursive; font-size:1.8rem; margin-bottom:4px; }
    p  { color:var(--muted); font-size:0.88rem; margin-bottom:24px; }
    label { display:block; font-size:0.76rem; color:var(--muted); margin-bottom:5px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
    input { width:100%; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; margin-bottom:14px; }
    input:focus { border-color:var(--green); }
    input::placeholder { color:var(--muted); }
    .btn { width:100%; background:var(--accent); color:#000; font-weight:700; border:none; padding:14px; border-radius:10px; cursor:pointer; font-size:1rem; font-family:'DM Sans',sans-serif; transition:background 0.2s; }
    .btn:hover { background:#e6c200; }
    .error { background:rgba(255,61,87,0.1); border:1px solid rgba(255,61,87,0.3); color:var(--red); padding:10px 14px; border-radius:10px; font-size:0.85rem; margin-bottom:14px; display:none; }
    .back { text-align:center; margin-top:18px; }
    .back a { color:var(--muted); text-decoration:none; font-size:0.85rem; transition:color 0.2s; }
    .back a:hover { color:var(--green); }
    .hint { background:rgba(0,200,83,0.06); border:1px solid rgba(0,200,83,0.15); border-radius:10px; padding:12px 14px; font-size:0.8rem; color:var(--muted); margin-bottom:20px; }
    .hint strong { color:var(--green); }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">Cricket<span>Pass</span></div>
  <div class="admin-tag">⚙️ Admin Panel</div>
  <h2>Admin Login</h2>
  <p>Dashboard access sathi login kara</p>

  <div class="hint">
    Default: <strong>admin@cricketpass.com</strong> / <strong>admin123</strong><br/>
    (.env madhye change karu shakta)
  </div>

  <div class="error" id="errMsg"></div>

  <label>Email</label>
  <input type="email" id="adminEmail" placeholder="admin@cricketpass.com"/>

  <label>Password</label>
  <input type="password" id="adminPass" placeholder="••••••••"/>

  <button class="btn" onclick="doAdminLogin()" id="loginBtn">Login to Dashboard →</button>

  <div class="back"><a href="/">← Back to Website</a></div>
</div>

<script>
async function doAdminLogin() {
  const email    = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPass').value;
  const btn      = document.getElementById('loginBtn');
  const err      = document.getElementById('errMsg');

  if (!email || !password) { showErr('Please fill all fields!'); return; }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  const res    = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const result = await res.json();

  if (result.success) {
    window.location.href = '/admin';
  } else {
    showErr(result.message || 'Login failed!');
    btn.textContent = 'Login to Dashboard →';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
